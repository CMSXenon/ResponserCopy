<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>门店导航</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
        .container { width: 100%; max-width: 400px; }
        h1 { text-align: center; font-size: 20px; margin-bottom: 24px; color: #333; }
        .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .card-id { font-size: 12px; color: #999; margin-bottom: 12px; }
        .btn { display: block; width: 100%; padding: 14px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; text-align: center; font-weight: 500; transition: opacity 0.2s; }
        .btn:active { opacity: 0.8; }
        .btn-meituan { background-color: #FFC72C; color: #000; }
        .btn-douyin { background-color: #00f2ea; color: #000; }
        .btn-amap { background-color: #0091ff; color: #fff; }
        .status { text-align: center; font-size: 14px; color: #666; margin-top: 8px; min-height: 20px; }
        .divider { text-align: center; color: #ccc; font-size: 12px; margin: 4px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏪 门店导航</h1>

        <!-- 美团 -->
        <div class="card">
            <div class="card-title">🍜 美团</div>
            <div class="card-id">门店ID: 645991378</div>
            <button class="btn btn-meituan" onclick="openMeituan()">打开美团门店</button>
            <div class="status" id="status-meituan"></div>
        </div>

        <!-- 抖音 -->
        <div class="card">
            <div class="card-title">🎵 抖音</div>
            <div class="card-id">门店ID: 7381333975844784182</div>
            <button class="btn btn-douyin" onclick="openDouyin()">打开抖音门店</button>
            <div class="status" id="status-douyin"></div>
        </div>

        <!-- 高德 -->
        <div class="card">
            <div class="card-title">🗺️ 高德地图</div>
            <div class="card-id">POI: B0K349TGV5</div>
            <button class="btn btn-amap" onclick="openAmap()">打开高德导航</button>
            <div class="status" id="status-amap"></div>
        </div>
    </div>

    <script>
        const isIOS = /iphone|ipad|ipod|ios/i.test(navigator.userAgent.toLowerCase());
        let activeTimeout = null;
        let activeStatus = null;

        // ========== 通用工具函数 ==========
        function setStatus(id, text) {
            document.getElementById(id).innerText = text;
        }

        function tryOpenWithFallback(options) {
            // options: { statusId, universalLink, schemes[], downloadUrl }
            const { statusId, universalLink, schemes, downloadUrl } = options;
            
            setStatus(statusId, '正在尝试打开...');
            activeStatus = statusId;

            // 第一步：尝试 Universal Link
            window.location.href = universalLink;

            let schemeIndex = 0;
            
            activeTimeout = setTimeout(() => {
                if (!document.hidden) {
                    tryNextScheme();
                }
            }, 2000);

            function tryNextScheme() {
                if (schemeIndex >= schemes.length) {
                    setStatus(statusId, '未检测到App，正在跳转下载页...');
                    window.location.href = downloadUrl;
                    return;
                }
                setStatus(statusId, `正在尝试备用方案 (${schemeIndex + 1}/${schemes.length})...`);
                window.location.href = schemes[schemeIndex];
                schemeIndex++;
                
                activeTimeout = setTimeout(() => {
                    if (!document.hidden) {
                        tryNextScheme();
                    }
                }, 2000);
            }
        }

        // 页面可见性监听
        document.addEventListener('visibilitychange', function() {
            if (document.hidden && activeTimeout) {
                clearTimeout(activeTimeout);
                activeTimeout = null;
                if (activeStatus) {
                    setStatus(activeStatus, '✅ 已打开App');
                }
            }
        });

        window.addEventListener('pageshow', function(event) {
            if (event.persisted && activeTimeout) {
                clearTimeout(activeTimeout);
                activeTimeout = null;
            }
        });

        // ========== 美团 ==========
        function openMeituan() {
            const shopId = '645991378';
            tryOpenWithFallback({
                statusId: 'status-meituan',
                universalLink: `https://i.meituan.com/shop/${shopId}`,
                schemes: [
                    `imeituan://www.meituan.com/shop/${shopId}`,
                    `imeituan://shop?shopId=${shopId}`,
                    `imeituan://www.meituan.com/deal/${shopId}`
                ],
                downloadUrl: isIOS
                    ? 'https://apps.apple.com/cn/app/id423084929'
                    : 'https://mobile.meituan.com/download'
            });
        }

        // ========== 抖音 ==========
        function openDouyin() {
            const shopId = '7381333975844784182';
            tryOpenWithFallback({
                statusId: 'status-douyin',
                universalLink: `https://www.douyin.com/shop/${shopId}`,
                schemes: [
                    `snssdk1128://user/profile/${shopId}`,
                    `snssdk1128://aweme/detail/${shopId}`,
                    `aweme://user/profile/${shopId}`,
                    `aweme://aweme/detail/${shopId}`
                ],
                downloadUrl: isIOS
                    ? 'https://apps.apple.com/cn/app/id1234567890'
                    : 'https://www.douyin.com/download'
            });
        }

        // ========== 高德地图 ==========
        function openAmap() {
            const poiId = 'B0K349TGV5';
            tryOpenWithFallback({
                statusId: 'status-amap',
                universalLink: `https://uri.amap.com/poi?id=${poiId}&sourceApplication=web`,
                schemes: [
                    // iOS Scheme
                    `iosamap://poi?sourceApplication=web&poiid=${poiId}`,
                    // Android Scheme
                    `androidamap://poi?sourceApplication=web&poiid=${poiId}`,
                    // 通用 Scheme
                    `amapuri://poi?sourceApplication=web&poiid=${poiId}`
                ],
                downloadUrl: isIOS
                    ? 'https://apps.apple.com/cn/app/id461703208'
                    : 'https://mobile.amap.com/download'
            });
        }
    </script>
</body>
</html>
