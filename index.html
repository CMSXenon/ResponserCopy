<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>古德堡联合口腔（丹徒分院）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(170deg, #f0f7ff 0%, #e8f4fd 50%, #f5f0ff 100%);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
      padding: 0;
      color: #333;
    }

    /* 顶部品牌区 */
    .header {
      background: linear-gradient(135deg, #1a73e8, #4a90d9, #6c5ce7);
      padding: 40px 24px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
      animation: shimmer 8s linear infinite;
    }

    @keyframes shimmer {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .logo-wrap {
      width: 88px;
      height: 88px;
      background: #fff;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      position: relative;
      z-index: 1;
    }

    .logo-wrap img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      border-radius: 12px;
    }

    .logo-placeholder {
      font-size: 40px;
      line-height: 1;
    }

    .store-name {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .store-address {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      position: relative;
      z-index: 1;
    }

    /* 主体内容 */
    .content {
      padding: 28px 20px 40px;
      max-width: 420px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #555;
      margin-bottom: 16px;
      padding-left: 12px;
      border-left: 3px solid #4a90d9;
    }

    /* 平台卡片 */
    .platform-card {
      display: block;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
      text-decoration: none;
      color: #333;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .platform-card:active {
      transform: scale(0.98);
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    .platform-card::after {
      content: '›';
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      color: #ccc;
      font-weight: 300;
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .platform-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .meituan-icon {
      background: linear-gradient(135deg, #ffcd00, #ffb300);
    }

    .douyin-icon {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
    }

    .gaode-icon {
      background: linear-gradient(135deg, #2196f3, #1976d2);
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .platform-name {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .platform-desc {
      font-size: 13px;
      color: #999;
    }

    .tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 500;
      vertical-align: middle;
    }

    .tag-hot {
      background: #fff0f0;
      color: #e63946;
    }

    .tag-new {
      background: #f0f7ff;
      color: #4a90d9;
    }

    /* 底部提示 */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #bbb;
      line-height: 1.6;
    }

    .footer .nfc-icon {
      font-size: 20px;
      display: block;
      margin-bottom: 6px;
    }

    /* 涟漪点击效果 */
    .platform-card {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

  <!-- 顶部品牌 -->
  <div class="header">
    <div class="logo-wrap">
      <img src="./logo.png" alt="logo">
    </div>
    <div class="store-name">古德堡联合口腔</div>
    <div class="store-address">丹徒分院 · 宝龙广场商业街18-5栋119号</div>
  </div>

  <!-- 平台入口 -->
  <div class="content">
    <div class="section-title">选择平台查看团购优惠</div>

    <!-- 美团 -->
    <a class="platform-card" href="http://dpurl.cn/ixmUgtXz">
      <div class="card-top">
        <div class="platform-icon meituan-icon">🍜</div>
        <div class="card-info">
          <div class="platform-name">美团团购 <span class="tag tag-hot">热门</span></div>
          <div class="platform-desc">团购套餐 · 洁牙 · 美白 · 补牙</div>
        </div>
      </div>
    </a>

    <!-- 抖音 -->
    <a class="platform-card" href="https://v.douyin.com/fyfSfIBSG2g/">
      <div class="card-top">
        <div class="platform-icon douyin-icon">🎵</div>
        <div class="card-info">
          <div class="platform-name">抖音团购 <span class="tag tag-new">优惠</span></div>
          <div class="platform-desc">限时特惠 · 抖音专享价</div>
        </div>
      </div>
    </a>

    <!-- 高德 -->
    <a class="platform-card" href="https://surl.amap.com/auGa2RYv5tU">
      <div class="card-top">
        <div class="platform-icon gaode-icon">📍</div>
        <div class="card-info">
          <div class="platform-name">高德地图</div>
          <div class="platform-desc">导航到店 · 查看门店信息</div>
        </div>
      </div>
    </a>
  </div>

  <!-- 底部 -->
  <div class="footer">
    <span class="nfc-icon">📱</span>
    手机碰一碰即可直达<br>
    古德堡联合口腔 © 2026
  </div>

</body>
</html>
